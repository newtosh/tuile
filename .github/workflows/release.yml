name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          ldflags="-s -w -X main.Version=${VERSION}"
          go build -ldflags="${ldflags}" -o "tuile-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/tuile
          go build -ldflags="${ldflags}" -o "tuile-mcp-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/tuile-mcp
      - uses: actions/upload-artifact@v4
        with:
          name: tuile-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            tuile-${{ matrix.goos }}-${{ matrix.goarch }}
            tuile-mcp-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
