name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify go.mod and go.sum
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Build binaries
        run: |
          go build -o /dev/null ./cmd/tuile
          go build -o /dev/null ./cmd/tuile-mcp
      - name: Unit tests
        run: go test ./... -count=1

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: browser-actions/setup-chrome@v2
      - name: Integration tests
        run: go test -tags=integration ./test/integration/... -count=1
